<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <div class="background-glow glow-left"></div>
        <div class="background-glow glow-right"></div>

        <header class="top-bar">
            <div class="brand-block">
                <span class="eyebrow">Local Party Mode</span>
                <div class="logo">Snake & Ladder</div>
            </div>

            <div class="top-actions">
                <button id="toggleVoiceBtn" class="glow-btn subtle-btn" type="button">Voice</button>
                <button id="toggleBgmBtn" class="glow-btn subtle-btn" type="button">Music</button>
                <button id="toggleSfxBtn" class="glow-btn subtle-btn" type="button">SFX</button>
            </div>
        </header>

        <main class="main-area">
            <aside class="sidebar">
                <div class="view-panel">
                    <div class="panel-header">
                        <div>
                            <span class="panel-kicker">Setup</span>
                            <h2>Players</h2>
                        </div>
                    </div>

                    <div class="setup-group">
                        <label class="input-label" for="playerCount">Number of players</label>
                        <select id="playerCount" class="input-control">
                            <option value="1">1 Player</option>
                            <option value="2">2 Players</option>
                            <option value="3">3 Players</option>
                            <option value="4">4 Players</option>
                            <option value="5">5 Players</option>
                        </select>
                    </div>

                    <div id="playerSetupList" class="player-setup-list"></div>

                    <div class="setup-actions">
                        <button id="startGameBtn" class="glow-btn" type="button">Start Game</button>
                        <button id="resetGameBtn" class="glow-btn secondary-btn" type="button">Reset</button>
                    </div>

                    <div class="side-message-card">
                        <span class="panel-kicker">Game Feed</span>
                        <div class="game-messages" id="gameMessages">Choose your players and press Start Game.</div>
                    </div>
                </div>
            </aside>

            <section class="board-column">
                <div class="board-stage">
                    <div class="board-stage-header">
                        <div>
                            <span class="panel-kicker">Board</span>
                            <h2>Board Arena</h2>
                        </div>
                        <div class="board-legend">
                            <span><i class="legend-dot ladder-dot"></i>Ladders</span>
                            <span><i class="legend-dot snake-dot"></i>Snakes</span>
                        </div>
                    </div>

                    <div class="game-board-wrapper">
                        <div id="gameBoard" class="board"></div>
                    </div>
                </div>
            </section>

            <aside class="sidebar">
                <div class="view-panel">
                    <div class="panel-header">
                        <div>
                            <span class="panel-kicker">Match</span>
                            <h2>Status</h2>
                        </div>
                    </div>

                    <div class="status-card">
                        <span class="mini-label">Current Turn</span>
                        <strong id="currentTurnLabel">Set up players to begin</strong>
                    </div>

                    <div class="status-card">
                        <span class="mini-label">Winner</span>
                        <strong id="winnerLabel">No winner yet</strong>
                    </div>

                    <div class="status-list-wrap">
                        <span class="mini-label">Player Positions</span>
                        <div id="playerStatusList" class="player-status-list"></div>
                    </div>

                    <div class="side-dice-card">
                        <span class="panel-kicker">Current Roll</span>
                        <div class="dice-container">
                            <div class="dice-meta">
                                <div id="diceCube" class="dice" aria-label="Dice showing 1"></div>
                                <span class="mini-label">Current roll</span>
                            </div>
                            <button id="rollDiceBtn" class="glow-btn dice-btn" type="button" disabled>Roll Dice</button>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="audio.js"></script>
    <script src="board.js"></script>
    <script src="game.js"></script>
</body>

</html>

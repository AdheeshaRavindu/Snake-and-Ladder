<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake & Ladder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <div class="background-glow glow-left"></div>
        <div class="background-glow glow-right"></div>

        <header class="top-bar">
            <div class="brand-block">
                <span class="eyebrow">Firebase Multiplayer</span>
                <div class="logo">Snake & Ladder</div>
            </div>

            <div class="top-actions">
                <button id="toggleVoiceBtn" class="glow-btn subtle-btn" type="button">Voice</button>
                <button id="toggleBgmBtn" class="glow-btn subtle-btn" type="button">Music</button>
                <button id="toggleSfxBtn" class="glow-btn subtle-btn" type="button">SFX</button>
            </div>
        </header>

        <main class="main-area">
            <aside class="sidebar">
                <div class="view-panel">
                    <div class="panel-header">
                        <div>
                            <span class="panel-kicker">Room</span>
                            <h2>Online Match</h2>
                        </div>
                    </div>

                    <div class="setup-group">
                        <label class="input-label" for="playerNameInput">Your name</label>
                        <input id="playerNameInput" class="input-control" type="text" maxlength="18" placeholder="Player name">
                    </div>

                    <div class="room-actions">
                        <button id="createRoomBtn" class="glow-btn" type="button">Create Room</button>
                    </div>

                    <div class="join-row">
                        <input id="roomCodeInput" class="input-control" type="text" maxlength="6" placeholder="Room code">
                        <button id="joinRoomBtn" class="glow-btn secondary-btn" type="button">Join</button>
                    </div>

                    <div class="status-card room-code-card">
                        <span class="mini-label">Room Code</span>
                        <strong id="roomCodeLabel">Not connected</strong>
                    </div>

                    <div class="setup-actions">
                        <button id="startGameBtn" class="glow-btn" type="button" disabled>Start Game</button>
                        <button id="leaveRoomBtn" class="glow-btn secondary-btn" type="button" disabled>Leave Room</button>
                    </div>

                    <div class="side-message-card">
                        <span class="panel-kicker">Game Feed</span>
                        <div class="game-messages" id="gameMessages">Create or join a room to begin.</div>
                    </div>
                </div>
            </aside>

            <section class="board-column">
                <div class="board-stage">
                    <div class="board-stage-header">
                        <div>
                            <span class="panel-kicker">Board</span>
                            <h2>Board Arena</h2>
                        </div>
                        <div class="board-legend">
                            <span><i class="legend-dot ladder-dot"></i>Ladders</span>
                            <span><i class="legend-dot snake-dot"></i>Snakes</span>
                        </div>
                    </div>

                    <div class="game-board-wrapper">
                        <div id="gameBoard" class="board"></div>
                    </div>
                </div>
            </section>

            <aside class="sidebar">
                <div class="view-panel">
                    <div class="panel-header">
                        <div>
                            <span class="panel-kicker">Match</span>
                            <h2>Status</h2>
                        </div>
                    </div>

                    <div class="status-card">
                        <span class="mini-label">Current Turn</span>
                        <strong id="currentTurnLabel">Waiting for room</strong>
                    </div>

                    <div class="status-card">
                        <span class="mini-label">Winner</span>
                        <strong id="winnerLabel">No winner yet</strong>
                    </div>

                    <div class="status-list-wrap">
                        <span class="mini-label">Players</span>
                        <div id="playerStatusList" class="player-status-list"></div>
                    </div>

                    <div class="side-dice-card">
                        <span class="panel-kicker">Current Roll</span>
                        <div class="dice-container">
                            <div class="dice-meta">
                                <div id="diceCube" class="dice" aria-label="Dice showing 1"></div>
                                <span class="mini-label">Current roll</span>
                            </div>
                            <button id="rollDiceBtn" class="glow-btn dice-btn" type="button" disabled>Roll Dice</button>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="audio.js"></script>
    <script src="board.js"></script>
    <script src="game.js"></script>
</body>

</html>
